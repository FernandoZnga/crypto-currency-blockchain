global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: api-gateway
    static_configs:
      - targets: ["api-gateway:8000"]

  - job_name: auth-service
    static_configs:
      - targets: ["auth-service:8001"]

  - job_name: wallet-service
    static_configs:
      - targets: ["wallet-service:8002"]

  - job_name: audit-service
    static_configs:
      - targets: ["audit-service:8010"]

  - job_name: blockchain-nodes
    static_configs:
      - targets:
          - "blockchain-node-1:8101"
          - "blockchain-node-2:8102"
          - "blockchain-node-3:8103"
